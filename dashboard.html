<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workers — Gabi Pago</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2e3347;
    --text: #e2e4ed;
    --muted: #8b8fa3;
    --accent: #6c5ce7;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 480px;
    width: 100%;
    padding: 40px 20px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #e2e4ed 0%, #6c5ce7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .initiatives {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .initiative {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .initiative:hover { border-color: var(--accent); }

  .initiative .folder {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 120px;
  }

  .initiative .name {
    font-size: 0.95rem;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Workers</h1>
  <div class="initiatives" id="root"></div>
</div>

<script>
(async function() {
  const root = document.getElementById('root');
  let data;
  try {
    const r = await fetch('dashboard-data.json?' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch (e) {
    root.innerHTML = `<div style="color:var(--muted);">Could not load data.</div>`;
    return;
  }

  root.innerHTML = (data.projects || []).map(p => `
    <div class="initiative">
      <span class="folder">${p.id}/</span>
      <span class="name">${p.name}</span>
    </div>
  `).join('');
})();
</script>

</body>
</html>
