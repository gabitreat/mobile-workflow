<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workers — Gabi Pago</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e2e4ed;
    --muted: #8b8fa3;
    --accent: #6c5ce7;
    --green: #00b894;
    --orange: #f39c12;
    --red: #d63031;
    --blue: #0984e3;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e2e4ed 0%, #6c5ce7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; }

  /* Card grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { border-color: var(--accent); }
  .card.open { border-color: var(--accent); box-shadow: 0 4px 24px rgba(108, 92, 231, 0.12); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: 1.05rem;
    font-weight: 700;
  }
  .card-folder {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .card-goal {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  /* Health dots row */
  .health {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .hdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .hdot.ok { background: var(--green); }
  .hdot.warn { background: var(--orange); }
  .hdot.pending { background: var(--muted); }
  .hdot.legacy { background: var(--orange); opacity: 0.4; }
  .hdot.reference { background: var(--blue); opacity: 0.4; }
  .health-label {
    font-size: 0.68rem;
    color: var(--muted);
    margin-left: 4px;
  }

  /* Issue count badge */
  .badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    text-transform: uppercase;
  }
  .badge.issues { background: rgba(243, 156, 18, 0.15); color: var(--orange); }
  .badge.blocker { background: rgba(214, 48, 49, 0.12); color: var(--red); }
  .badge.clear { background: rgba(0, 184, 148, 0.12); color: var(--green); }

  /* Expand arrow */
  .expand-hint {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .card:hover .expand-hint { opacity: 1; }
  .card.open .expand-hint { display: none; }

  /* Detail panel */
  .detail {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.25s ease;
  }
  .card.open .detail { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-section {
    margin-bottom: 12px;
  }
  .detail-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .detail-progress {
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
  }

  /* Repo rows */
  .repo {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 0.75rem;
    margin-bottom: 3px;
  }
  .repo .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ok { background: var(--green); }
  .dot.warn { background: var(--orange); }
  .dot.pending { background: var(--muted); }
  .dot.legacy { background: var(--orange); opacity: 0.4; }
  .dot.reference { background: var(--blue); opacity: 0.4; }

  .repo .rname {
    font-weight: 600;
    color: var(--text);
    min-width: 110px;
  }
  .repo .rbranch {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .repo .rcommit {
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }

  /* Issues in detail */
  .issue {
    font-size: 0.78rem;
    color: var(--orange);
    padding: 3px 0 3px 14px;
    position: relative;
  }
  .issue::before {
    content: '';
    position: absolute;
    left: 3px;
    top: 10px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--orange);
  }
  .issue.blocker { color: var(--red); }
  .issue.blocker::before { background: var(--red); }

  /* Coverage bars */
  .coverage {
    margin-bottom: 10px;
  }
  .cov-overall {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .cov-pct {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .cov-label {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .cov-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .cov-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .cov-layers {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px;
  }
  .cov-layer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    padding: 3px 8px;
    background: var(--surface2);
    border-radius: 4px;
  }
  .cov-layer .lname { color: var(--muted); min-width: 65px; }
  .cov-layer .lbar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .cov-layer .lbar-fill {
    height: 100%;
    border-radius: 2px;
  }
  .cov-layer .lcount {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Working / Blocked lists */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
  .mini-list {
    font-size: 0.75rem;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 6px;
  }
  .mini-list .ml-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .ml-title.ok { color: var(--green); }
  .ml-title.blocked { color: var(--red); }
  .mini-list li {
    color: var(--muted);
    padding: 1px 0;
    list-style: none;
    padding-left: 10px;
    position: relative;
  }
  .mini-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--muted);
  }
  .mini-list.ok-list li::before { background: var(--green); }
  .mini-list.blocked-list li::before { background: var(--red); }

  .updated {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 28px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 24px;
    padding: 5px 14px;
    border-radius: 16px;
    font-size: 0.8rem;
    font-weight: 500;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    text-decoration: none;
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    .repo { flex-wrap: wrap; }
    .repo .rcommit { width: 100%; text-align: left; margin-top: 2px; }
  }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-link">&larr; Workflow</a>
  <div id="root"><div style="text-align:center;padding:60px 0;color:var(--muted);">Loading...</div></div>
</div>

<script>
(async function() {
  const root = document.getElementById('root');
  let data;
  try {
    const r = await fetch('dashboard-data.json?' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch (e) {
    root.innerHTML = `<div style="color:var(--red);text-align:center;padding:40px;">Could not load data: ${e.message}</div>`;
    return;
  }

  function covColor(pct) {
    if (pct >= 70) return 'var(--green)';
    if (pct >= 40) return 'var(--orange)';
    return 'var(--red)';
  }

  function renderCoverage(p) {
    if (!p.coverage) return '';
    const c = p.coverage;
    let h = '<div class="detail-section"><div class="detail-label">Coverage</div><div class="coverage">';
    h += `<div class="cov-overall">
      <span class="cov-pct" style="color:${covColor(c.overall)}">${c.overall}%</span>
      <div class="cov-bar-bg"><div class="cov-bar-fill" style="width:${c.overall}%;background:${covColor(c.overall)}"></div></div>
    </div>`;
    if (c.layers && c.layers.length) {
      h += '<div class="cov-layers">';
      c.layers.forEach(l => {
        const pct = Math.round((l.done / l.total) * 100);
        h += `<div class="cov-layer">
          <span class="lname">${l.name}</span>
          <div class="lbar"><div class="lbar-fill" style="width:${pct}%;background:${covColor(pct)}"></div></div>
          <span class="lcount">${l.done}/${l.total}</span>
        </div>`;
      });
      h += '</div>';
    }
    h += '</div></div>';
    return h;
  }

  function renderWorkingBlocked(p) {
    if (!p.working && !p.blocked) return '';
    let h = '<div class="detail-section"><div class="two-col">';
    if (p.working && p.working.length) {
      h += `<div class="mini-list ok-list"><div class="ml-title ok">Working</div><ul>${p.working.map(w => `<li>${w}</li>`).join('')}</ul></div>`;
    }
    if (p.blocked && p.blocked.length) {
      h += `<div class="mini-list blocked-list"><div class="ml-title blocked">Blocked</div><ul>${p.blocked.map(b => `<li>${b}</li>`).join('')}</ul></div>`;
    }
    h += '</div></div>';
    return h;
  }

  let html = `<h1>Workers</h1><div class="sub">${data.engineer} &middot; ${data.role}</div>`;
  html += '<div class="cards">';

  (data.projects || []).forEach(p => {
    const hasBlocker = (p.issues || []).some(i => i.toLowerCase().includes('blocker'));
    const issueCount = (p.issues || []).length;

    let badgeHtml = '';
    if (hasBlocker) badgeHtml = '<span class="badge blocker">blocker</span>';
    else if (issueCount > 0) badgeHtml = `<span class="badge issues">${issueCount} issue${issueCount > 1 ? 's' : ''}</span>`;
    else badgeHtml = '<span class="badge clear">clear</span>';

    // Health dots
    const dots = (p.repos || []).map(r => `<span class="hdot ${r.status}" title="${r.name}"></span>`).join('');

    // Repo detail rows
    let repoRows = '';
    (p.repos || []).forEach(r => {
      repoRows += `<div class="repo">
        <span class="dot ${r.status}"></span>
        <span class="rname">${r.name}</span>
        <span class="rbranch">${r.branch}</span>
        <span class="rcommit">${r.lastCommit}</span>
      </div>`;
    });

    // Issue rows
    let issueRows = '';
    (p.issues || []).forEach(issue => {
      const cls = issue.toLowerCase().includes('blocker') ? 'issue blocker' : 'issue';
      issueRows += `<div class="${cls}">${issue}</div>`;
    });

    html += `
      <div class="card" onclick="this.classList.toggle('open')">
        ${badgeHtml}
        <div class="card-top">
          <span class="card-name">${p.name}</span>
        </div>
        <div class="card-goal">${p.endGoal}</div>
        <div class="health">${dots}<span class="health-label">${(p.repos||[]).length} repo${(p.repos||[]).length > 1 ? 's' : ''}</span></div>
        <div class="expand-hint">tap for details</div>

        <div class="detail">
          ${renderCoverage(p)}
          <div class="detail-section">
            <div class="detail-label">Progress</div>
            <div class="detail-progress">${p.progress}</div>
          </div>
          ${renderWorkingBlocked(p)}
          <div class="detail-section">
            <div class="detail-label">Repos</div>
            ${repoRows}
          </div>
          ${issueRows ? `<div class="detail-section"><div class="detail-label">Issues</div>${issueRows}</div>` : ''}
        </div>
      </div>
    `;
  });

  html += '</div>';

  const updated = new Date(data.lastUpdated);
  html += `<div class="updated">Updated ${updated.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>`;

  root.innerHTML = html;
})();
</script>

</body>
</html>
