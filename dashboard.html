<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Dashboard — Gabi Pago</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e2e4ed;
    --text-muted: #8b8fa3;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.15);
    --green: #00b894;
    --green-glow: rgba(0, 184, 148, 0.15);
    --orange: #f39c12;
    --orange-glow: rgba(243, 156, 18, 0.15);
    --red: #d63031;
    --red-glow: rgba(214, 48, 49, 0.1);
    --blue: #0984e3;
    --blue-glow: rgba(9, 132, 227, 0.15);
    --pink: #e84393;
    --yellow: #fdcb6e;
    --radius: 12px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .dash-header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e2e4ed 0%, #6c5ce7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .dash-header .meta {
    text-align: right;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .dash-header .meta .name {
    font-weight: 600;
    color: var(--text);
    font-size: 1rem;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    text-decoration: none;
    transition: var(--transition);
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  /* Pulse indicator */
  .pulse {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .pulse-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-anim 2s ease-in-out infinite;
  }
  .pulse-dot.stale {
    background: var(--orange);
    animation: none;
  }
  .pulse-dot.offline {
    background: var(--text-muted);
    animation: none;
  }
  @keyframes pulse-anim {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(0, 184, 148, 0); }
  }

  /* Updated timestamp */
  .updated-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .updated-bar .timestamp { font-weight: 500; color: var(--text); }

  /* Section cards */
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .count {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-muted);
  }

  /* Focus banner */
  .focus-banner {
    background: linear-gradient(135deg, var(--accent-glow) 0%, rgba(9, 132, 227, 0.08) 100%);
    border: 1px solid rgba(108, 92, 231, 0.3);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .focus-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent);
  }
  .focus-banner .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .focus-banner .focus-text {
    font-size: 1.3rem;
    font-weight: 700;
  }

  /* Work items grid */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* Active work card */
  .work-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: var(--transition);
  }
  .work-card:hover { border-color: var(--accent); }
  .work-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .work-card .card-id {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 500;
  }
  .work-card .card-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .work-card .card-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .work-card .card-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Tags / badges */
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .tag.ios { background: var(--blue-glow); color: var(--blue); }
  .tag.android { background: var(--green-glow); color: var(--green); }
  .tag.backend { background: rgba(232, 67, 147, 0.15); color: var(--pink); }
  .tag.feature { background: rgba(108, 92, 231, 0.15); color: var(--accent); }
  .tag.bug { background: var(--red-glow); color: var(--red); }
  .tag.chore { background: var(--orange-glow); color: var(--orange); }
  .tag.in-progress { background: var(--blue-glow); color: var(--blue); }
  .tag.blocked { background: var(--red-glow); color: var(--red); }
  .tag.done { background: var(--green-glow); color: var(--green); }
  .tag.stale { background: var(--orange-glow); color: var(--orange); }
  .tag.review { background: rgba(108, 92, 231, 0.15); color: var(--accent); }

  /* Status badge */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.active { background: var(--green); }
  .status-dot.stale { background: var(--orange); }
  .status-dot.blocked { background: var(--red); }

  /* Blocker card */
  .blocker-card {
    background: var(--surface);
    border: 1px solid rgba(214, 48, 49, 0.3);
    border-left: 4px solid var(--red);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .blocker-card .blocker-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .blocker-card .blocker-desc {
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .blocker-card .blocker-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .severity-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .severity-badge.high { background: var(--red-glow); color: var(--red); }
  .severity-badge.medium { background: var(--orange-glow); color: var(--orange); }
  .severity-badge.low { background: var(--blue-glow); color: var(--blue); }

  /* Stale work card */
  .stale-card {
    background: var(--surface);
    border: 1px solid rgba(243, 156, 18, 0.3);
    border-left: 4px solid var(--orange);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .stale-card .stale-title {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stale-card .stale-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .stale-days {
    font-weight: 700;
    color: var(--orange);
  }

  /* Past day summary */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .day-card .day-date {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .day-card ul {
    list-style: none;
    padding: 0;
  }
  .day-card li {
    padding: 6px 0 6px 16px;
    position: relative;
    font-size: 0.85rem;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .day-card li:last-child { border-bottom: none; }
  .day-card li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Session log */
  .session-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .session-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.8rem;
    flex: 1;
    min-width: 200px;
  }
  .session-chip .chip-date {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .session-chip .chip-detail {
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  /* Repo group */
  .repo-group { margin-bottom: 20px; }
  .repo-group-header {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 6px 0;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .repo-group-header .repo-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 0.65rem;
  }

  /* Filter pills */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-pill {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 0.7rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
  }
  .filter-pill:hover { border-color: var(--accent); color: var(--text); }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Collapsible */
  .collapse-toggle {
    cursor: pointer;
    user-select: none;
  }
  .collapse-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s ease;
    font-size: 0.8rem;
  }
  .collapse-toggle.open .arrow { transform: rotate(90deg); }
  .collapse-body { display: none; }
  .collapse-body.open { display: block; }

  /* Stat cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-card .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .stat-card .stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Section spacing */
  .dash-section {
    margin-bottom: 32px;
  }

  /* Branch display */
  .branch-name {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.75rem;
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--text-muted);
  }

  /* Freshness bar */
  .freshness {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .freshness-bar {
    width: 60px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .freshness-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .freshness-fill.fresh { background: var(--green); }
  .freshness-fill.aging { background: var(--orange); }
  .freshness-fill.stale { background: var(--red); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--red);
    background: var(--red-glow);
    border: 1px solid rgba(214, 48, 49, 0.3);
    border-radius: var(--radius);
  }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-link">&larr; Workflow</a>

  <div id="dashboard-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      Loading dashboard data...
    </div>
  </div>
</div>

<script>
(async function() {
  const root = document.getElementById('dashboard-content');

  let data;
  try {
    const resp = await fetch('dashboard-data.json?' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
  } catch (e) {
    root.innerHTML = `<div class="error-state">
      <p>Could not load dashboard data.</p>
      <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">${e.message}</p>
    </div>`;
    return;
  }

  const now = new Date();
  const lastUpdated = new Date(data.lastUpdated);
  const minutesAgo = Math.floor((now - lastUpdated) / 60000);
  const hoursAgo = Math.floor(minutesAgo / 60);
  const daysAgo = Math.floor(hoursAgo / 24);

  function timeAgo(date) {
    const d = new Date(date);
    const mins = Math.floor((now - d) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  function daysBetween(d1, d2) {
    return Math.floor((new Date(d2) - new Date(d1)) / 86400000);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // Freshness: < 2h = fresh, < 24h = aging, > 24h = stale
  let freshnessClass = 'fresh';
  let freshnessLabel = 'Active today';
  let pulseDotClass = '';
  let freshnessWidth = 100;

  if (minutesAgo > 1440) { // > 24h
    freshnessClass = 'stale';
    freshnessLabel = `Last updated ${daysAgo}d ago`;
    pulseDotClass = 'stale';
    freshnessWidth = 20;
  } else if (minutesAgo > 120) { // > 2h
    freshnessClass = 'aging';
    freshnessLabel = `Updated ${hoursAgo}h ago`;
    pulseDotClass = 'stale';
    freshnessWidth = 60;
  }

  // Compute stale items (not touched in 3+ days)
  const STALE_THRESHOLD_DAYS = 3;
  const computedStaleItems = data.activeItems
    .filter(item => {
      const daysSince = daysBetween(item.lastTouchedAt, now.toISOString());
      return daysSince >= STALE_THRESHOLD_DAYS && item.status !== 'done';
    })
    .map(item => ({
      ...item,
      staleDays: daysBetween(item.lastTouchedAt, now.toISOString())
    }));

  // Merge with explicit stale items
  const allStale = [...(data.staleItems || []), ...computedStaleItems];
  // Deduplicate by id
  const staleMap = new Map();
  allStale.forEach(s => staleMap.set(s.id, s));
  const staleItems = Array.from(staleMap.values());

  // Active (non-stale) items
  const activeNonStale = data.activeItems.filter(item =>
    !staleItems.find(s => s.id === item.id)
  );

  // Group items by repo
  function groupByRepo(items) {
    const groups = {};
    items.forEach(item => {
      const repo = item.repo || 'unknown';
      if (!groups[repo]) groups[repo] = [];
      groups[repo].push(item);
    });
    return groups;
  }

  // Get unique repos for filter
  const allRepos = new Set();
  data.activeItems.forEach(i => allRepos.add(i.repo));
  data.staleItems.forEach(i => allRepos.add(i.repo));

  // Build HTML
  let html = '';

  // Header
  html += `
    <div class="dash-header">
      <div>
        <h1>Work Dashboard</h1>
      </div>
      <div class="meta">
        <div class="name">${data.engineer}</div>
        <div>${data.role}</div>
      </div>
    </div>
  `;

  // Updated bar
  html += `
    <div class="updated-bar">
      <div class="pulse ${pulseDotClass}">
        <span class="pulse-dot ${pulseDotClass}"></span>
        <span>${freshnessLabel}</span>
      </div>
      <div>
        <div class="freshness">
          <div class="freshness-bar"><div class="freshness-fill ${freshnessClass}" style="width:${freshnessWidth}%"></div></div>
          <span class="timestamp">${lastUpdated.toLocaleString()}</span>
        </div>
      </div>
    </div>
  `;

  // Stats row
  html += `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--green)">${activeNonStale.length}</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--orange)">${staleItems.length}</div>
        <div class="stat-label">Stale</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--red)">${(data.blockers || []).length}</div>
        <div class="stat-label">Blockers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent)">${allRepos.size}</div>
        <div class="stat-label">Repos</div>
      </div>
    </div>
  `;

  // Focus banner
  if (data.currentFocus) {
    html += `
      <div class="focus-banner">
        <div class="label">Current Focus</div>
        <div class="focus-text">${data.currentFocus}</div>
      </div>
    `;
  }

  // Blockers (show prominently if any)
  if (data.blockers && data.blockers.length > 0) {
    html += `<div class="dash-section">
      <div class="section-title">Blockers <span class="count">${data.blockers.length}</span></div>`;
    data.blockers.forEach(b => {
      html += `
        <div class="blocker-card">
          <div class="blocker-header">
            <span style="font-weight:600;">${b.relatedItem || ''}</span>
            <span class="severity-badge ${b.severity}">${b.severity}</span>
          </div>
          <div class="blocker-desc">${b.description}</div>
          <div class="blocker-meta">Since ${timeAgo(b.since)}</div>
        </div>`;
    });
    html += `</div>`;
  }

  // Active work — grouped by repo
  html += `<div class="dash-section">
    <div class="section-title">Active Work <span class="count">${activeNonStale.length}</span></div>`;
  if (activeNonStale.length === 0) {
    html += `<div class="empty-state">No active work items right now.</div>`;
  } else {
    const activeGroups = groupByRepo(activeNonStale);
    Object.keys(activeGroups).sort().forEach(repo => {
      const items = activeGroups[repo];
      html += `<div class="repo-group">
        <div class="repo-group-header">${repo} <span class="repo-count">${items.length}</span></div>
        <div class="grid-2">`;
      items.forEach(item => {
        const touchedAgo = timeAgo(item.lastTouchedAt);
        html += `
          <div class="work-card">
            <div class="card-header">
              <span class="card-id">${item.id}</span>
              <span class="tag ${item.status}">${item.status.replace('-', ' ')}</span>
            </div>
            <div class="card-title">${item.title}</div>
            <div class="card-summary">${item.summary}</div>
            ${item.branch ? `<div style="margin-bottom:8px;"><span class="branch-name">${item.branch}</span></div>` : ''}
            <div class="card-meta">
              ${(item.tags || []).map(t => `<span class="tag ${t}">${t}</span>`).join('')}
              <span style="font-size:0.7rem;color:var(--text-muted);">touched ${touchedAgo}</span>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    });
  }
  html += `</div>`;

  // Stale work — collapsible, grouped by repo
  if (staleItems.length > 0) {
    html += `<div class="dash-section">
      <div class="section-title collapse-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span class="arrow">&#9654;</span> Stale Work <span class="count">${staleItems.length}</span>
        <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted);margin-left:8px;">click to expand</span>
      </div>
      <div class="collapse-body">`;
    const staleGroups = groupByRepo(staleItems);
    Object.keys(staleGroups).sort().forEach(repo => {
      const items = staleGroups[repo];
      html += `<div class="repo-group">
        <div class="repo-group-header">${repo} <span class="repo-count">${items.length}</span></div>`;
      items.forEach(item => {
        const days = item.staleDays || daysBetween(item.lastTouchedAt, now.toISOString());
        html += `
          <div class="stale-card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div class="stale-title">${item.id}</div>
              <span class="stale-days">${days}d</span>
            </div>
            <div class="stale-meta">
              <span class="branch-name">${item.branch}</span>
              ${item.summary ? `<br>${item.summary}` : ''}
            </div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Past day summary
  if (data.pastDaySummary && data.pastDaySummary.length > 0) {
    html += `<div class="dash-section">
      <div class="section-title">Recent Activity</div>`;
    data.pastDaySummary.forEach(day => {
      html += `
        <div class="day-card">
          <div class="day-date">${formatDate(day.date)}</div>
          <ul>${day.items.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>`;
    });
    html += `</div>`;
  }

  // Session log
  if (data.sessionLog && data.sessionLog.length > 0) {
    html += `<div class="dash-section">
      <div class="section-title">Session Log</div>
      <div class="session-bar">`;
    data.sessionLog.slice(0, 7).forEach(s => {
      html += `
        <div class="session-chip">
          <div class="chip-date">${formatDate(s.date)}</div>
          <div class="chip-detail">
            ${s.sessions} session${s.sessions > 1 ? 's' : ''}
            &middot; ${(s.repos || []).join(', ')}
          </div>
          ${s.notes ? `<div class="chip-detail" style="margin-top:4px;">${s.notes}</div>` : ''}
        </div>`;
    });
    html += `</div></div>`;
  }

  root.innerHTML = html;
})();
</script>

</body>
</html>
